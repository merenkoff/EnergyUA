# Перевірка перед мерджем / автодеплоєм (Railway може деплоїти з Git окремо).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      # Збірка без реальної БД: у layout задано force-dynamic (див. layout.tsx).
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build?schema=public
